<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Siber Göz | Güvenli Bölge</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #lock { position: fixed; width: 100%; height: 100%; background: #000; z-index: 99; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .terminal { border: 1px solid #0f0; padding: 25px; box-shadow: 0 0 20px #0f0; background: rgba(0,20,0,0.9); width: 85%; max-width: 350px; }
        input { background: transparent; border: none; color: #0f0; outline: none; font-size: 20px; width: 120px; }
        #main { display: none; width: 100%; padding: 15px; box-sizing: border-box; }
        video { width: 100%; border: 1px solid #0f0; border-radius: 10px; display: none; }
        button { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; margin-top: 15px; cursor: pointer; border-radius: 5px; text-transform: uppercase; }
        textarea { width: 100%; background: #111; color: #0f0; border: 1px solid #0f0; margin-top: 10px; padding: 10px; box-sizing: border-box; }
        #out { color: #fff; margin-top: 15px; border-top: 1px dashed #0f0; padding-top: 10px; word-break: break-all; }
    </style>
</head>
<body>
    <div id="lock">
        <div class="terminal">
            <div style="font-size: 12px; margin-bottom: 10px;">[SYS_SECURE_LOGIN]</div>
            <span style="color:#0f0">root@muharrem:~#</span>
            <input type="password" id="pass" autofocus onkeypress="if(event.keyCode==13)check()">
        </div>
    </div>
    <div id="main">
        <h2 style="letter-spacing: 5px; text-align: center;">SİBER GÖZ V2.2</h2>
        <video id="vid" autoplay playsinline></video>
        <button onclick="start()">KAMERAYI AKTİF ET</button>
        <textarea id="inp" rows="3" placeholder="YAKALANAN KOD..."></textarea>
        <button onclick="dec()" style="background:#040; color:#0f0;">DEŞİFRE ET</button>
        <div id="out">...</div>
    </div>
    <script>
        function check(){ if(document.getElementById('pass').value=='1923'){ document.getElementById('lock').style.display='none'; document.getElementById('main').style.display='block'; } else { alert("ERİŞİM ENGELLENDİ!"); document.getElementById('pass').value=''; } }
        async function start(){
            const v=document.getElementById('vid');
            try {
                const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                v.srcObject=s; v.style.display="block";
                setInterval(async()=>{
                    const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
                    c.getContext('2d').drawImage(v,0,0);
                    const {data:{text}}=await Tesseract.recognize(c.toDataURL(),'eng');
                    if(text.length>4) document.getElementById('inp').value=text.trim();
                },3000);
            } catch(e) { alert("Kamera Hatası: " + e); }
        }
        function dec(){ try{ document.getElementById('out').innerText="ÇÖZÜLEN: " + atob(document.getElementById('inp').value.replace(/\s/g,'')); } catch(e){ document.getElementById('out').innerText="HATA: FORMAT GEÇERSİZ"; } }
    </script>
</body>
</html>
